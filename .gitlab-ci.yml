# Leeloo:) — GitLab CI/CD

stages:
  - build
  - test
  - package

# ========================================
# 1. BUILD — перевірка структури проєкту
# ========================================
build:
  stage: build
  script:
    - echo "Checking project structure..."
    - ls -la
  artifacts:
    paths:
      - "**/*"
    expire_in: 1 week
  only:
    - main

# ========================================
# 2. TEST — перевірка наявності файлів
# ========================================
test:
  stage: test
  script:
    - echo "Checking manifest.json..."
    - if [ -f "manifest.json" ]; then echo "manifest.json found"; else echo "manifest.json missing"; exit 1; fi
    - echo "Checking LICENSE..."
    - if [ -f "LICENSE" ]; then echo "LICENSE found"; else echo "LICENSE missing"; fi
    - echo "Checking README.md..."
    - if [ -f "README.md" ]; then echo "README.md found"; else echo "README.md missing"; fi
    - echo "All checks completed!"
  dependencies:
    - build
  only:
    - main

# ========================================
# 3. PACKAGE — створення ZIP-архіву
# ========================================
package:
  stage: package
  script:
    - echo "Creating archive..."
    - zip -r leeloo-$(git rev-parse --short HEAD).zip . -x "*.git*" ".gitlab-ci.yml"
    - echo "Archive created!"
  artifacts:
    paths:
      - "*.zip"
    expire_in: 30 days
  only:
    - main